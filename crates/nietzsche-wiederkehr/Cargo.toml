[package]
name        = "nietzsche-wiederkehr"
version     = "0.1.0"
edition     = "2021"
description = "Wiederkehr — Autonomous DAEMON agents that patrol the NietzscheDB graph"

[dependencies]
nietzsche-graph  = { workspace = true }
nietzsche-query  = { workspace = true }
nietzsche-neural = { path = "../nietzsche-neural" }
serde           = { workspace = true }
serde_json      = { workspace = true }
bincode         = { workspace = true }
tokio           = { workspace = true }
tracing         = { workspace = true }
thiserror       = { workspace = true }
uuid            = { workspace = true }
lru             = { workspace = true }
once_cell       = { workspace = true }
parking_lot     = { workspace = true }
regex           = "1"
ort             = { version = "2.0.0-rc.11", features = ["ndarray"] }
ndarray         = { workspace = true }

[dev-dependencies]
tempfile = "3"
